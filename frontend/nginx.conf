# Rate limit zones (defined at http level, outside server block)
# auth: 5 req/min per IP — brute-force protection on login/register
# checkout: 10 req/min per IP — flash sale bot drain protection
# api: 120 req/min per IP — general API abuse protection
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
limit_req_status 429;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Django auth — 5 req/min per IP (brute-force protection)
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://django:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Django media files (product images) — never cache so updates show immediately
    location /media/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Checkout — tighter limit before the general FastAPI block matches
    location /api/v1/orders/checkout {
        limit_req zone=checkout burst=2 nodelay;
        proxy_pass http://fastapi:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy FastAPI — 120 req/min general
    location /api/v1/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://fastapi:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
