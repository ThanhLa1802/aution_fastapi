<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Manager</title>
    <link rel="stylesheet" href="tasks.css">
</head>

<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <h1>📋 Task Manager</h1>
            </div>
            <div class="navbar-user">
                <span id="user-email" class="user-email"></span>
                <button onclick="handleLogout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>📊 Dashboard</h3>
                <button class="sidebar-item active" onclick="showSection('overview')">Overview</button>
                <button class="sidebar-item" onclick="showSection('active')">Active Tasks</button>
                <button class="sidebar-item" onclick="showSection('completed')">Completed</button>
            </div>

            <div class="sidebar-section">
                <div class="task-stats">
                    <div class="stat">
                        <span class="stat-number" id="total-tasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="active-count">0</span>
                        <span class="stat-label">Active</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Create Task Section -->
            <div class="create-task-section">
                <h2>Create New Task</h2>
                <form id="createTaskForm" class="create-form">
                    <div class="form-group">
                        <input type="text" id="task-title" placeholder="Task title..." required>
                        <span class="error-message" id="title-error"></span>
                    </div>

                    <div class="form-group">
                        <textarea id="task-description" placeholder="Task description..." rows="3" required></textarea>
                        <span class="error-message" id="description-error"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span class="btn-icon">➕</span> Add Task
                    </button>
                    <span class="error-message" id="create-error"></span>
                </form>
            </div>

            <!-- Tasks List Section -->
            <div class="tasks-section">
                <!-- Overview Section -->
                <div id="overview-section" class="section active">
                    <h2>Your Tasks</h2>
                    <div id="tasks-overview" class="tasks-container">
                        <div class="empty-state">
                            <p>📝 No tasks yet. Create your first task to get started!</p>
                        </div>
                    </div>
                </div>

                <!-- Active Tasks Section -->
                <div id="active-section" class="section">
                    <h2>Active Tasks</h2>
                    <div id="tasks-active" class="tasks-container">
                        <div class="empty-state">
                            <p>✅ All tasks completed or no active tasks</p>
                        </div>
                    </div>
                </div>

                <!-- Completed Tasks Section -->
                <div id="completed-section" class="section">
                    <h2>Completed Tasks</h2>
                    <div id="tasks-completed" class="tasks-container">
                        <div class="empty-state">
                            <p>🎉 No completed tasks yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="taskModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeTaskModal()">&times;</span>
            <h2>Task Details</h2>
            <div id="modalBody" class="modal-body">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Task</h2>
            <form id="editTaskForm" class="form">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" required>
                    <span class="error-message" id="edit-title-error"></span>
                </div>

                <div class="form-group">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" rows="4" required></textarea>
                    <span class="error-message" id="edit-description-error"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                </div>
                <span class="error-message" id="edit-error"></span>
            </form>
        </div>
    </div>

    <script src="tasks.js"></script>
</body>

</html>
